<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
    }

    .dashboard-container {
      display: flex;
      width: 100%;
    }

    .sidebar {
      width: 250px;
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .role {
      font-size: 18px;
      margin-top: 20px;
    }

    .main-content {
      flex-grow: 1;
      background-color: #ecf0f1;
      padding: 40px;
      text-align: center;
    }

    h2, h3 {
      margin-bottom: 20px;
    }

    .logout-btn, #studentBtn {
      padding: 10px 20px;
      margin-top: 20px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .logout-btn:hover, #studentBtn:hover {
      background-color: #2980b9;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    ul li {
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <div class="sidebar">
      <div class="logo">cloud EM</div>
      <div id="role" class="role"></div>
    </div>

    <div class="main-content">
      <h2 id="welcome"></h2>

      <!-- 🔹 Teacher will see this button -->
      <button id="studentBtn" onclick="loadStudents()" style="display:none;">Student List</button>

      <ul id="studentList"></ul>

      <br>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </div>

  <script>
    // Get the token from local storage
    const token = localStorage.getItem("token");

    // If the token is not found, redirect to the login page
    if (!token) {
      window.location.href = "login.html";
    }

    // Decode the JWT token to get the user info (name and role)
    const payload = JSON.parse(atob(token.split(".")[1]));

    // Display the user information (name and role)
    document.getElementById("welcome").innerText = `Hi ${payload.name}, Welcome To DASHBOARD`;
    document.getElementById("role").innerText = `You are in mode: ${payload.role}`;

    // If the user is a teacher, show the "Student List" button
    if (payload.role === "teacher") {
      document.getElementById("studentBtn").style.display = "block";
    }

    // Function to load the student list (only visible to teachers)
    async function loadStudents() {
      const res = await fetch("https://cloud-attendance-system-xyob.onrender.com/api/auth/students", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();

      const list = document.getElementById("studentList");
      list.innerHTML = "";

      // Populate the student list
      data.forEach(student => {
        const li = document.createElement("li");
        li.innerText = `${student.name} (${student.email})`;
        list.appendChild(li);
      });
    }

    // Function to logout the user
    function logout() {
      localStorage.removeItem("token");
      window.location.href = "welcome.html";
    }
  </script>

</body>
</html>
