<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Based Attendance Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f9ff;
            margin: 0;
            padding: 0;
        }
        .container {
            text-align: center;
            padding: 50px;
        }
        .header {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }
        .sub-header {
            font-size: 24px;
            color: #555;
            margin-bottom: 30px;
        }
        .button {
            background-color: #00bcd4;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #008c9e;
        }
        .images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 30px;
        }
        .images img {
            width: 300px;
            height: auto;
            border-radius: 10px;
        }
        .cloud {
            position: absolute;
            top: 20px;
            right: 50px;
            width: 100px;
        }
        .laptop {
            width: 600px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>cloud EM</span>
        </div>
        <div class="sub-header">
            Cloud Based Attendance Management System
        </div>
        <a href="welcome.html" class="button">Get Started</a>
        <div class="images">
            <img src="one.png" class="laptop" alt="Attendance Dashboard">
            
        </div>
    </div>

  
</body>
</html>
