<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",Arial;background:#f4f6f8;display:flex}
.dashboard-container{display:flex;width:100%;min-height:100vh}
.sidebar{width:240px;background:#2c3e50;color:white;padding:25px 20px}
.logo{font-size:26px;font-weight:bold;margin-bottom:30px}
.role{font-size:15px;opacity:.9}
.main-content{flex:1;padding:40px}
.action-bar{margin-bottom:25px}
button{padding:10px 18px;margin:5px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#2980b9}
.live{background:#27ae60!important;box-shadow:0 0 12px rgba(46,204,113,.9);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 5px #2ecc71}50%{box-shadow:0 0 18px #2ecc71}100%{box-shadow:0 0 5px #2ecc71}}
.card{background:white;border-radius:10px;padding:22px;margin:20px auto;width:420px;box-shadow:0 8px 18px rgba(0,0,0,.08);display:none}
.card input{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px}
.msg{margin-top:15px;font-weight:bold;color:#27ae60}
.history-wrapper{display:none;margin-top:20px}
.history-header{width:90%;margin:auto;display:flex;justify-content:flex-end;gap:10px}
table{width:90%;margin:auto  auto 30px;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.08)}
th{background:#2c3e50;color:white;padding:12px}
td{padding:12px;border-bottom:1px solid #eee;text-align:center}
.present{color:green;font-weight:bold}
.absent{color:red;font-weight:bold}
.logout{background:#e74c3c;margin-top:30px}
.logout:hover{background:#c0392b}
</style>
</head>

<body>
<div class="dashboard-container">
  <div class="sidebar">
    <div class="logo">cloud EM</div>
    <div id="role" class="role"></div>
  </div>

  <div class="main-content">
    <h2 id="welcome"></h2>

    <div class="action-bar">
      <button id="giveAttendanceBtn" style="display:none" onclick="openAttendanceBox()">Give Attendance</button>
      <button onclick="loadAttendanceHistory()">Check Attendance</button>
    </div>

    <div id="attendanceBox" class="card">
      <h3>Enter Attendance Code</h3><br>
      <input id="codeInput" placeholder="Enter OTP" />
      <br><br>
      <button id="submitBtn" onclick="submitAttendance()">Submit</button>
      <div id="msg" class="msg"></div>
    </div>

    <div id="historyWrapper" class="history-wrapper">
      <div class="history-header">
        <button onclick="downloadAttendancePDF()">Download PDF</button>
        <button onclick="closeAttendanceHistory()">Close</button>
      </div>
      <div id="historyBox"></div>
    </div>

    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script>
const token = localStorage.getItem("token");
if(!token) location.href="studentlogin.html";

const payload = JSON.parse(atob(token.split(".")[1]));
document.getElementById("welcome").innerText=`Hi ${payload.name}, Welcome`;
document.getElementById("role").innerText=`Role: ${payload.role}`;

const giveBtn=document.getElementById("giveAttendanceBtn");

async function checkAttendanceLive(){
 const res=await fetch("https://cloud-attendance-system-xyob.onrender.com/api/attendance/active");
 const data=await res.json();
 data.isActive?(giveBtn.style.display="inline-block",giveBtn.classList.add("live")):(giveBtn.style.display="none",giveBtn.classList.remove("live"));
}
setInterval(checkAttendanceLive,5000);checkAttendanceLive();

function openAttendanceBox(){attendanceBox.style.display="block"}

async function submitAttendance(){
 const res=await fetch("https://cloud-attendance-system-xyob.onrender.com/api/attendance/mark",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({studentId:payload.id,code:codeInput.value})});
 const data=await res.json();
 msg.innerText=data.message;
 if(data.message.toLowerCase().includes("success")){codeInput.style.display="none";submitBtn.style.display="none"}
}

async function loadAttendanceHistory(){
 const res=await fetch(`https://cloud-attendance-system-xyob.onrender.com/api/attendance/student/history/${payload.id}`);
 const data=await res.json();

 let html=`<table><tr><th>Date & Time</th><th>Teacher</th><th>Status</th></tr>`;
 data.forEach(a=>{
  html+=`<tr>
   <td>${new Date(a.date).toLocaleString()}</td>
   <td>${a.teacherName}</td>
   <td class="${a.status==="Present"?"present":"absent"}">${a.status}</td>
  </tr>`;
 });
 html+="</table>";
 historyBox.innerHTML=html;
 historyWrapper.style.display="block";
}

function closeAttendanceHistory(){historyWrapper.style.display="none";historyBox.innerHTML=""}

async function downloadAttendancePDF(){
 const {jsPDF}=window.jspdf;
 const doc=new jsPDF();
 const res=await fetch(`https://cloud-attendance-system-xyob.onrender.com/api/attendance/student/history/${payload.id}`);
 const data=await res.json();

 doc.text("Student Attendance Report",14,20);
 doc.text(`Name: ${payload.name}`,14,30);

 const rows=data.map(a=>[new Date(a.date).toLocaleString(),a.teacherName,a.status]);
 doc.autoTable({startY:40,head:[["Date & Time","Teacher","Status"]],body:rows});
 doc.save(`${payload.name}_Attendance_Report.pdf`);
}

function logout(){localStorage.removeItem("token");location.href="welcome.html"}
</script>
</body>
</html>
